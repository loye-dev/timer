server {
    listen 8080;
    server_name timer.loye.dev;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types text/html text/plain text/xml text/css text/javascript application/javascript application/json image/svg+xml font/woff2;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' ${PLAUSIBLE_URL}; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ${PLAUSIBLE_URL}; frame-ancestors 'none'; base-uri 'self'; form-action 'none';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ico|svg|png|jpg|jpeg|gif|webp|webmanifest|txt)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
