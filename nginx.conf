server {
    listen 8080;
    server_name timer.loye.dev;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_types text/html text/plain text/xml text/css text/javascript application/javascript application/json image/svg+xml font/woff2;

    # HTML — jamais mis en cache (index.html référence les assets hachés)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' ${PLAUSIBLE_URL}; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ${PLAUSIBLE_URL}; worker-src blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none';" always;
    }

    # Assets statiques — cache immuable 1 an (noms hachés par Nuxt)
    # Note: add_header dans ce bloc ne hérite PAS du bloc server, headers explicités ici
    location ~* \.(js|css|woff2?|ico|svg|png|jpg|jpeg|gif|webp|webmanifest|txt)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
